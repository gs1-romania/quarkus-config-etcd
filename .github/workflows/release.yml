name: Maven Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to checkout when cutting the release."
        required: true
        default: "master"
      releaseVersion:
        description: "Default version to use when preparing a release."
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "Default version to use for new local working copy."
        required: true
        default: "X.Y.Z-SNAPSHOT"

jobs:
  release:
    runs-on: ubuntu-latest
    name: release
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
          server-id: central
          server-username: OSSRH_MAVEN_USERNAME
          server-password: OSSRH_MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git author
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Maven release
        id: release
        run: |
          git fetch --tags
          git push origin --delete release-${{ github.event.inputs.releaseVersion }} || true
          git checkout -b release-${{ github.event.inputs.releaseVersion }}
          mvn -B release:prepare -Prelease-sona -DreleaseVersion=${{ github.event.inputs.releaseVersion }} -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }}
          git checkout ${{ github.event.inputs.branch }}
          git rebase release-${{ github.event.inputs.releaseVersion }}
          mvn -B release:perform -Prelease-sona -Darguments="-Prelease-sona -DperformRelease"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          OSSRH_MAVEN_USERNAME: ${{ secrets.OSSRH_MAVEN_USERNAME }}
          OSSRH_MAVEN_PASSWORD: ${{ secrets.OSSRH_MAVEN_PASSWORD }}

      - name: Push release branch and tags
        uses: ad-m/github-push-action@v0.6.0
        if: steps.release.outcome == 'success'
        with:
          github_token: ${{ github.token }}
          tags: true
          branch: release-${{ github.event.inputs.releaseVersion }}

      - name: Open pull request to ${{ github.event.inputs.branch }}
        if: steps.release.outcome == 'success'
        run: |
          gh pr create \
            --title "Release ${{ github.event.inputs.releaseVersion }}" \
            --body "Merges release commits and bumps development version to ${{ github.event.inputs.developmentVersion }}." \
            --head release-${{ github.event.inputs.releaseVersion }} \
            --base ${{ github.event.inputs.branch }}
        env:
          GH_TOKEN: ${{ github.token }}